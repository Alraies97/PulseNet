<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PulseNet — Connect, share, and engage." />
  <title>PulseNet</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a href="#" class="navbar__brand">
        <span class="navbar__logo" aria-hidden="true">◆</span>
        PulseNet
      </a>
      <nav class="navbar__actions">
        <button type="button" class="btn btn--ghost">Log in</button>
        <button type="button" class="btn btn--primary">Sign up</button>
      </nav>
    </div>
  </header>

  <main class="feed">
    <div class="feed__inner">
      <!-- Create Post -->
      <section class="create-post" aria-labelledby="create-post-heading">
        <h2 id="create-post-heading" class="visually-hidden">Create a post</h2>
        <div class="create-post__card">
          <div class="create-post__avatar" aria-hidden="true">Y</div>
          <div class="create-post__body">
            <label for="post-input" class="visually-hidden">What's on your mind?</label>
            <textarea
              id="post-input"
              class="create-post__textarea"
              rows="3"
              placeholder="What's on your mind?"
            ></textarea>
            <div class="create-post__footer">
              <button type="button" class="btn btn--publish">
                <span class="btn__icon" aria-hidden="true">↑</span>
                Publish
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- Posts Feed (populated by app.js) -->
      <section class="posts-feed" aria-labelledby="feed-heading">
        <h2 id="feed-heading" class="posts-feed__title">Your feed</h2>
        <div id="posts-list" class="posts-feed__list"></div>
      </section>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
